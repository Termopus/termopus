name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build macOS signed & notarized DMG
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build Termopus Bridge
        run: |
          cd bridge
          cargo build --release

      - name: Create App Bundle
        run: |
          cd bridge
          cargo bundle --release

      - name: Copy hook binary into app bundle
        run: |
          cp bridge/target/release/termopus-hook bridge/target/release/bundle/osx/Termopus.app/Contents/MacOS/

      - name: Fix resources location
        run: |
          # cargo-bundle puts resources in a subfolder, move them up
          if [ -d "bridge/target/release/bundle/osx/Termopus.app/Contents/Resources/resources" ]; then
            mv bridge/target/release/bundle/osx/Termopus.app/Contents/Resources/resources/* bridge/target/release/bundle/osx/Termopus.app/Contents/Resources/ 2>/dev/null || true
            rmdir bridge/target/release/bundle/osx/Termopus.app/Contents/Resources/resources 2>/dev/null || true
          fi

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Sign App Bundle
        run: |
          cd bridge/target/release/bundle/osx
          # Remove any existing signature
          codesign --remove-signature Termopus.app 2>/dev/null || true
          # Sign binaries first (all executables must be signed for notarization)
          codesign --force --options runtime \
            --entitlements $GITHUB_WORKSPACE/bridge/entitlements.plist \
            --sign "Developer ID Application: YOUR_DEVELOPER_NAME (YOUR_APPLE_TEAM_ID)" \
            --timestamp \
            Termopus.app/Contents/MacOS/termopus
          codesign --force --options runtime \
            --entitlements $GITHUB_WORKSPACE/bridge/entitlements.plist \
            --sign "Developer ID Application: YOUR_DEVELOPER_NAME (YOUR_APPLE_TEAM_ID)" \
            --timestamp \
            Termopus.app/Contents/MacOS/termopus-hook
          # Sign the bundle
          codesign --force --options runtime \
            --entitlements $GITHUB_WORKSPACE/bridge/entitlements.plist \
            --sign "Developer ID Application: YOUR_DEVELOPER_NAME (YOUR_APPLE_TEAM_ID)" \
            --timestamp \
            Termopus.app
          # Verify
          codesign -vvv --deep --strict Termopus.app

      - name: Create DMG
        run: |
          cd bridge/target/release/bundle/osx
          # Create DMG directly from signed app (matching local build script)
          hdiutil create -volname "Termopus" -srcfolder Termopus.app -ov -format UDZO Termopus.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd bridge/target/release/bundle/osx
          xcrun notarytool submit Termopus.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple Termopus.dmg

      - name: Rename DMG with version
        run: |
          mv bridge/target/release/bundle/osx/Termopus.dmg bridge/target/release/bundle/osx/Termopus-${{ github.ref_name }}-mac.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: termopus-macos
          path: bridge/target/release/bundle/osx/Termopus-${{ github.ref_name }}-mac.dmg

  # Build Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Get dependencies
        run: |
          cd app
          flutter pub get

      - name: Build APK
        run: |
          cd app
          flutter build apk --release

      - name: Rename APK
        run: |
          mv app/build/app/outputs/flutter-apk/app-release.apk app/build/app/outputs/flutter-apk/termopus-${{ github.ref_name }}.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: termopus-android
          path: app/build/app/outputs/flutter-apk/termopus-${{ github.ref_name }}.apk

  # Create GitHub Release with all artifacts
  release:
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: termopus-macos
          path: ./artifacts

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: termopus-android
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Termopus ${{ github.ref_name }}
          body: |
            ## Termopus ${{ github.ref_name }}

            ### Downloads
            - **macOS**: `Termopus-${{ github.ref_name }}-mac.dmg` - Signed & notarized installer
            - **Android**: `termopus-${{ github.ref_name }}.apk` - Install on your Android device

            ### Installation
            **macOS**: Double-click the DMG, drag Termopus to Applications
            **Android**: Enable "Install from unknown sources" and install the APK

            ### Requirements
            - macOS: Claude Code (`npm install -g @anthropic-ai/claude-code`)
            - Android: None
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            ./artifacts/Termopus-${{ github.ref_name }}-mac.dmg
            ./artifacts/termopus-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

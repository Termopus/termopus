name: OSS Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  release:
    name: Tag & Release
    if: >-
      github.repository == 'Termopus/termopus' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'sync/')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get latest tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Check if there are commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count "${LATEST_TAG}..HEAD")
          fi

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new commits since $LATEST_TAG — skipping release"
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

          # Auto-increment patch version
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            NEW_TAG="v0.1.0"
          else
            # Strip leading 'v'
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Releasing $NEW_TAG (previous: $LATEST_TAG, $COMMIT_COUNT new commits)"

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # Generate commit log since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${LATEST_TAG}..HEAD")
          fi

          # Build release body
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG}"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          # Build new CHANGELOG section
          SECTION=$(printf "## %s (%s)\n\n%s\n" "$NEW_TAG" "$RELEASE_DATE" "$COMMITS")

          # Prepend to CHANGELOG.md (create if missing)
          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (header)
            {
              head -n 1 CHANGELOG.md
              echo ""
              echo "$SECTION"
              echo ""
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$SECTION"
            } > CHANGELOG.md
          fi

      - name: Commit CHANGELOG.md
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${{ steps.version.outputs.new_tag }}"
          git push

      - name: Create tag and release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --latest

  build-macos:
    name: Build macOS (arm64)
    needs: release
    if: needs.release.outputs.skip == 'false'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release

      - name: Create app bundle
        working-directory: bridge
        run: |
          cargo install cargo-bundle
          cargo bundle --release
          # Include hook binary in the app bundle
          cp target/release/termopus-hook target/release/bundle/osx/Termopus.app/Contents/MacOS/

      - name: Create DMG
        working-directory: bridge
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          hdiutil create -volname "Termopus" \
            -srcfolder target/release/bundle/osx/Termopus.app \
            -ov -format UDZO \
            "Termopus-${TAG}-macos-arm64.dmg"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          gh release upload "$TAG" "bridge/Termopus-${TAG}-macos-arm64.dmg"

  build-windows:
    name: Build Windows (x86_64)
    needs: release
    if: needs.release.outputs.skip == 'false'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release

      - name: Create MSI
        working-directory: bridge
        shell: bash
        run: |
          cargo install cargo-wix
          cargo wix --no-build --nocapture

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          MSI=$(find bridge/target/wix -name '*.msi' | head -1)
          DEST="Termopus-${TAG}-windows-x86_64.msi"
          cp "$MSI" "$DEST"
          gh release upload "$TAG" "$DEST"

  build-linux:
    name: Build Linux (x86_64)
    needs: release
    if: needs.release.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Build bridge
        working-directory: bridge
        run: cargo build --release

      - name: Package
        working-directory: bridge
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          mkdir -p "Termopus-${TAG}"
          cp target/release/termopus "Termopus-${TAG}/"
          cp target/release/termopus-hook "Termopus-${TAG}/"
          tar -czf "Termopus-${TAG}-linux-x86_64.tar.gz" "Termopus-${TAG}/"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release.outputs.new_tag }}"
          gh release upload "$TAG" "bridge/Termopus-${TAG}-linux-x86_64.tar.gz"

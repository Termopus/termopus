name: OSS Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    name: Tag & Release
    if: >-
      github.repository == 'Termopus/termopus' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'sync/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get latest tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Check if there are commits since the last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMIT_COUNT=$(git rev-list --count HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count "${LATEST_TAG}..HEAD")
          fi

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new commits since $LATEST_TAG — skipping release"
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

          # Auto-increment patch version
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            NEW_TAG="v0.1.0"
          else
            # Strip leading 'v'
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Releasing $NEW_TAG (previous: $LATEST_TAG, $COMMIT_COUNT new commits)"

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # Generate commit log since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${LATEST_TAG}..HEAD")
          fi

          # Build release body
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG}"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

          # Build new CHANGELOG section
          SECTION=$(printf "## %s (%s)\n\n%s\n" "$NEW_TAG" "$RELEASE_DATE" "$COMMITS")

          # Prepend to CHANGELOG.md (create if missing)
          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (header)
            {
              head -n 1 CHANGELOG.md
              echo ""
              echo "$SECTION"
              echo ""
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$SECTION"
            } > CHANGELOG.md
          fi

      - name: Commit CHANGELOG.md
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${{ steps.version.outputs.new_tag }}"
          git push

      - name: Create tag and release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --latest
